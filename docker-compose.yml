version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artisanalley-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # By default, Docker will use the cloud Atlas URI if you provide it in your local .env,
      # or you can override it here to connect to the local mongodb service below.
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/artisanalley}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - artisanalley-network

  mongodb:
    image: mongo:7.0
    container_name: artisanalley-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - artisanalley-network

volumes:
  mongodb_data:
    driver: local

networks:
  artisanalley-network:
    driver: bridge
